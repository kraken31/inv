<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RSI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <header class="topbar">
    <h1>RSI &lt; 30</h1>
    <nav class="nav">
      <a href="{{ url_for('index') }}">Portefeuille</a>
      <a href="{{ url_for('per_page') }}">PER</a>
      <a href="{{ url_for('rsi_page') }}" class="active">RSI</a>
      <a href="{{ url_for('rendement_page') }}">Rendement</a>
    </nav>
  </header>

  <main>
    <section class="toolbar">
      <input type="search" id="search" placeholder="Rechercher (nom ou ISIN)…" />
      <button id="reload" type="button">Actualiser</button>
    </section>

    <div id="status" class="status"></div>

    <table id="rsi-table" class="wallet">
      <thead>
        <tr>
          <th data-key="name" class="sort">Nom</th>
          <th data-key="per" class="sort num">PER</th>
          <th data-key="rsi" class="sort num">RSI</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="{{ url_for('static', filename='rsi.js') }}"></script>
</body>
</html>
